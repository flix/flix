name: Compiler

on:
  pull_request:
  merge_group:
  push:
    branches: [ master ]

# Cancel previous runs if the PR is updated
concurrency:
  cancel-in-progress: true
  group: build-${{ github.ref }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out master
        uses: actions/checkout@v5
      - name: Install JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Cache Mill and Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.cache/mill
          key: ${{ runner.os }}-mill-${{ hashFiles('build.mill', '.mill-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-
      - name: Build
        run: ./mill flix.compile
      - name: Run tests with timeout
        timeout-minutes: 20
        # ScalaTest flags: -o = stdout reporter, C = suppress TestSucceeded, O = suppress SuiteCompleted
        run: ./mill flix.test.testForked "-oCO"

  build-and-test-examples:
    runs-on: ubuntu-latest

    steps:
      - name: Check out master
        uses: actions/checkout@v5
      - name: Install JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Cache Mill and Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.cache/mill
          key: ${{ runner.os }}-mill-${{ hashFiles('build.mill', '.mill-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-
      - name: Build
        run: ./mill flix.compile
      - name: Run example tests with timeout
        timeout-minutes: 20
        run: ./mill flix.testExamples
